<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="calculator-container">
        <div class="input-output-container">
            
        </div>

        <div class="input-keys">
            <div class="clear-delete">
                <button class="key" id="clear">CLEAR</button>
                <button class="key" id="delete">DELETE</button>
            </div>

            <div class="row-1">
                <button class="key nums-operators">7</button>
                <button class="key nums-operators">8</button>
                <button class="key nums-operators">9</button>
                <button class="key nums-operators">/</button>
            </div>

            <div class="row-2">
                <button class="key nums-operators">4</button>
                <button class="key nums-operators">5</button>
                <button class="key nums-operators">6</button>
                <button class="key nums-operators">*</button>
            </div>

            <div class="row-3">
                <button class="key nums-operators">1</button>
                <button class="key nums-operators">2</button>
                <button class="key nums-operators">3</button>
                <button class="key nums-operators">-</button>
            </div>

            <div class="row-4">
                <button class="key nums-operators">0</button>
                <button class="key nums-operators" id="decimal">.</button>
                <button class="key nums-operators">=</button>
                <button class="key nums-operators">+</button>
            </div>
        </div>
    </div>
</body>
</html>
