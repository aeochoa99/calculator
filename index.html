<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="calculator-container">
        <div class="input-output-container">
            
        </div>

        <div class="input-keys">
            <div class="clear-delete">
                <div class="key" id="clear">CLEAR</div>
                <div class="key" id="delete">DELETE</div>
            </div>

            <div class="row-1">
                <div class="key nums-operators">7</div>
                <div class="key nums-operators">8</div>
                <div class="key nums-operators">9</div>
                <div class="key nums-operators">/</div>
            </div>

            <div class="row-2">
                <div class="key nums-operators">4</div>
                <div class="key nums-operators">5</div>
                <div class="key nums-operators">6</div>
                <div class="key nums-operators">*</div>
            </div>

            <div class="row-3">
                <div class="key nums-operators">1</div>
                <div class="key nums-operators">2</div>
                <div class="key nums-operators">3</div>
                <div class="key nums-operators">-</div>
            </div>

            <div class="row-4">
                <div class="key nums-operators">0</div>
                <div class="key nums-operators">.</div>
                <div class="key nums-operators">=</div>
                <div class="key nums-operators">+</div>
            </div>
        </div>
    </div>
</body>
</html>
